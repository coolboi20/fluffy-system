<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI Mood-Based Playlist Generator</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        .success { color: #1DB954; font-weight: bold; }
        .error { color: #e91e63; font-weight: bold; }
        .track-list { list-style: none; padding: 0; }
        .track-item { margin-bottom: 5px; }
        .btn { background-color: #1DB954; color: white; border: none; padding: 10px 20px; text-decoration: none; display: inline-block; border-radius: 20px; cursor: pointer; font-size: 16px; }
        .btn:hover { background-color: #1ed760; }
        .btn-small { background-color: #1DB954; color: white; border: none; padding: 4px 12px; text-decoration: none; display: inline-block; border-radius: 12px; cursor: pointer; font-size: 12px; margin-left: 10px; vertical-align: middle; }
        .btn-small:hover { background-color: #1ed760; }
        .btn-yt { background-color: #FF0000; color: white; border: none; padding: 4px 12px; text-decoration: none; display: inline-block; border-radius: 12px; cursor: pointer; font-size: 12px; margin-left: 10px; vertical-align: middle; }
        .btn-yt:hover { background-color: #CC0000; }
        .btn-remove { background-color: #ff4d4d; color: white; border: none; padding: 4px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; margin-left: 10px; vertical-align: middle; }
        .btn-remove:hover { background-color: #ff1a1a; }
        .track-img { width: 40px; height: 40px; border-radius: 4px; vertical-align: middle; margin-right: 10px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AI Mood-Based Playlist Generator</h1>

    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <div th:if="${success}" class="success">
        <p th:text="${success}"></p>
        <p th:if="${playlistUrl}"><a th:href="${playlistUrl}" target="_blank">Open Playlist on Spotify</a></p>
    </div>

    <div th:if="${authUrl}">
        <p>Please log in to Spotify to continue:</p>
        <a th:href="${authUrl}" class="btn">🎵 Log in with Spotify</a>
    </div>

    <div th:unless="${authUrl}">
        <form th:action="@{/generate}" method="post" enctype="multipart/form-data">
            <label for="mood">Describe your current mood or vibe:</label>
            <input type="text" id="mood" name="mood" th:value="${mood}" placeholder="e.g. upbeat summer hits, melancholy rainy day...">
            
            <label for="image">Or upload a picture:</label>
            <input type="file" id="image" name="image" accept="image/*">
            
            <button type="submit" class="btn">Generate Playlist</button>
        </form>

        <div th:if="${playlist}">
            <h2 th:text="${playlist.title}"></h2>
            <p th:text="${playlist.description}"></p>

            <h3>Track List:</h3>
            <ul class="track-list">
                <li th:each="song, iter : ${playlist.songs}" class="track-item">
                    <img th:if="${song.imageUrl}" th:src="${song.imageUrl}" class="track-img">
                    <span th:text="${iter.index + 1} + '. '"></span>
                    <strong th:text="${song.title}"></strong> - <span th:text="${song.artist}"></span>
                    
                    <a th:if="${song.spotifyUrl}" th:href="${song.spotifyUrl}" target="_blank" class="btn-small">Preview on Spotify</a>
                    <a th:if="${song.youtubeMusicUrl}" th:href="${song.youtubeMusicUrl}" target="_blank" class="btn-yt">YouTube Music</a>
                    
                    <form th:action="@{/remove-song}" method="post" style="display: inline;">
                        <input type="hidden" name="index" th:value="${iter.index}">
                        <button type="submit" class="btn-remove">Remove</button>
                    </form>
                    
                    <audio th:if="${song.previewUrl}" controls style="height: 30px; vertical-align: middle; margin-left: 10px;">
                        <source th:src="${song.previewUrl}" type="audio/mpeg">
                    </audio>
                </li>
            </ul>

            <form th:action="@{/create-spotify}" method="post">
                <button type="submit" class="btn">Create on Spotify</button>
            </form>
        </div>
    </div>
</body>
</html>
